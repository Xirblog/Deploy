services:
  frontend:
    image: frontend
    container_name: frontend
    build:
      context: ../Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api
      - BACKEND_URL=http://gateway:8080
    networks:
      - services-network
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    image: gateway
    container_name: gateway
    build:
      context: ../BlogGateway
      dockerfile: src/BlogGateway/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - PORT=8080
    networks:
      - services-network
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - post-service
    restart: unless-stopped

  post-service:
    image: post-service
    container_name: post-service
    build:
      context: ../BlogPostService
      dockerfile: src/BlogPostService/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=post-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      GrpcClients__UserService__Address: "http://user-service:8080"
    networks:
      - services-network
    depends_on:
      post-db:
        condition: service_healthy
        
  post-db:
    image: postgres:18.3-alpine
    container_name: post-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - services-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U testuser -d testdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - post-pgdata:/var/lib/postgresql/18/docker
        
  user-service:
    container_name: user-service
    build:
      context: ../BlogUserService
      dockerfile: src/BlogUserService/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=user-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    networks:
      - services-network
    depends_on:
      user-db:
        condition: service_healthy

  user-db:
    image: postgres:18.3-alpine
    container_name: user-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - services-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U testuser -d testdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - user-pgdata:/var/lib/postgresql/18/docker

  auth-service:
    container_name: auth-service
    build:
      context: ../BlogAuthService
      dockerfile: src/BlogAuthService/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=auth-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      GrpcClients__UserService__Url: "http://user-service:8080"
    networks:
      - services-network
    depends_on:
      auth-db:
        condition: service_healthy

  auth-db:
    image: postgres:18.3-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - services-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U testuser -d testdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - auth-pgdata:/var/lib/postgresql/18/docker

networks:
  services-network:
    driver: bridge

volumes:
  user-pgdata:
  auth-pgdata:
  post-pgdata:
