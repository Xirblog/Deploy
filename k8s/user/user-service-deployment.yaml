apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
          - 'sh'
          - '-c'
          - |
            echo "Waiting for PostgreSQL at user-postgres:5432..."
            until nc -z user-postgres 5432 2>/dev/null; do
              echo "PostgreSQL not ready yet, waiting..."
              sleep 2
            done
            echo "✓ PostgreSQL is ready!"
      containers:
      - name: user-service
        image: user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ConnectionStrings__DefaultConnection
          value: "Host=user-postgres;Port=5432;Database=testdb;Username=testuser;Password=testpassword"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Kubernetes"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
